server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API proxy — lets the frontend call a relative /api path
  # instead of an absolute http://localhost:8000/api baked into the
  # build. An absolute localhost URL only works when the browser is on
  # the same machine as the backend; it breaks for anyone accessing this
  # container through a tunnel or a different host, since "localhost"
  # would resolve to *their* machine, not this one. "backend" resolves
  # via Docker's internal network — see docker-compose.yml.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
