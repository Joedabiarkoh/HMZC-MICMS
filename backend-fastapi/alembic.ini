[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url is deliberately NOT set here — migrations/env.py reads
# the real connection string from app.core.config.settings.DATABASE_URL
# (the same .env-backed setting everything else in this app uses)
# instead of duplicating it in a second config file that could drift
# out of sync with the real one.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
