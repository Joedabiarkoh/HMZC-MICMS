# Root-level compose file that runs the whole system together.
# (backend-fastapi/docker-compose.yml also exists and runs backend+db
# alone, for backend-only development.)
version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: hmzc_database
    environment:
      POSTGRES_USER: hmzc_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hmzc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend-fastapi
    container_name: hmzc_backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - ./backend-fastapi/.env

  frontend:
    build: ./frontend-react
    container_name: hmzc_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: hmzc_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
