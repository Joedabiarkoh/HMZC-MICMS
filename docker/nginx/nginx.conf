# Minimal reverse proxy: routes /api to the backend, everything else to
# the frontend. The source chat mentioned nginx.conf as a file to create
# but never wrote its contents.
events {}

http {
  server {
    listen 80;

    location /api/ {
      proxy_pass http://backend:8000/api/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend:80/;
      proxy_set_header Host $host;
    }
  }
}
